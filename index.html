<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Lead Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{
  margin:0;
  height:100%;
}
#map{
  width:100%;
  height:100vh;
}
.info{
  position:absolute;
  top:10px;
  left:10px;
  z-index:1000;
  background:white;
  padding:12px;
  border-radius:12px;
  box-shadow:0 4px 20px rgba(0,0,0,.15);
}
</style>
</head>

<body>

<div class="info">
  <b>Lead Map</b>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const map = L.map('map').setView([16,107],6);

L.tileLayer(
'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
{
 maxZoom:19
}
).addTo(map);

L.marker([10.7769,106.7009])
.addTo(map)
.bindPopup("Hồ Chí Minh");
</script>

</body>
</html>
