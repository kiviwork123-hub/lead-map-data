<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Lead Map</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{
  margin:0;
  height:100%;
}

#map{
  width:100%;
  height:100vh;
}

.info{
  position:absolute;
  top:10px;
  left:10px;
  z-index:1000;
  background:white;
  padding:10px;
  border-radius:10px;
  box-shadow:0 2px 10px rgba(0,0,0,.2);
}
</style>
</head>

<body>

<div class="info">
  <b>Lead Map</b><br>
  Đang tải dữ liệu...
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const CSV_URL =
"https://raw.githubusercontent.com/kiviwork123-hub/lead-map-data/main/lead-map%20(1)%20full%202.csv";

const map = L.map('map').setView([16,107],6);

L.tileLayer(
'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
{
 maxZoom:19
}
).addTo(map);

fetch(CSV_URL)
.then(r=>r.text())
.then(csv=>{

 const lines = csv.split("\n");

 document.querySelector(".info").innerHTML =
 `<b>Lead Map</b><br>${lines.length-1} records`;

 for(let i=1;i<Math.min(lines.length,5000);i++){

   const row = lines[i].split(",");

   const lat = parseFloat(row[0]);
   const lng = parseFloat(row[1]);

   if(isNaN(lat)||isNaN(lng)) continue;

   const bank = row[2] || "";
   const tail3 = row[3] || "";

   L.circleMarker(
     [lat,lng],
     {
       radius:4
     }
   )
   .addTo(map)
   .bindPopup(
      `<b>${bank}</b><br>
       Tail: ${tail3}`
   );
 }

});
</script>

</body>
</html>
