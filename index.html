```html
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Lead Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{
    margin:0;
    padding:0;
    height:100%;
    font-family:Arial,sans-serif;
}

#map{
    width:100%;
    height:100vh;
}

.info{
    position:absolute;
    top:10px;
    left:10px;
    z-index:9999;
    background:white;
    padding:12px;
    border-radius:12px;
    box-shadow:0 4px 12px rgba(0,0,0,.2);
}

.badge{
    color:white;
    padding:4px 8px;
    border-radius:6px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="info">
    <b>Lead Map</b><br>
    Đang tải dữ liệu...
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const CSV_URL =
"https://raw.githubusercontent.com/kiviwork123-hub/lead-map-data/main/lead-map%20(1)%20full%202.csv";

const map = L.map('map').setView([16.2,107.8],6);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    maxZoom:19
}
).addTo(map);

const colors = {
    ACB:"#2563eb",
    VCB:"#16a34a",
    TCB:"#f97316",
    MBB:"#7c3aed",
    BIDV:"#dc2626",
    HDB:"#ca8a04",
    MSB:"#0891b2",
    VPB:"#15803d"
};

function getColor(bank){
    return colors[bank] || "#6b7280";
}

fetch(CSV_URL)
.then(r=>r.text())
.then(csv=>{

    const lines = csv.split("\n");

    document.querySelector(".info").innerHTML =
        "<b>Lead Map</b><br>" +
        (lines.length-1).toLocaleString() +
        " records";

    for(let i=1;i<lines.length;i++){

        const row = lines[i].split(",");

        const lat = parseFloat(row[0]);
        const lng = parseFloat(row[1]);

        if(isNaN(lat) || isNaN(lng)) continue;

        const bank = row[2] || "";
        const tail3 = row[3] || "";
        const qrType = row[4] || "";
        const activeHours = row[5] || "";
        const status = row[6] || "";

        const marker = L.circleMarker(
            [lat,lng],
            {
                radius:5,
                color:getColor(bank),
                fillColor:getColor(bank),
                fillOpacity:0.9,
                weight:1
            }
        );

        marker.bindPopup(`
            <div style="min-width:220px">

                <div
                style="
                background:${getColor(bank)};
                color:white;
                display:inline-block;
                padding:6px 10px;
                border-radius:8px;
                font-weight:bold;">
                ${bank}
                </div>

                <h3>***${tail3}</h3>

                <p>
                <b>QR:</b> ${qrType}<br>
                <b>Giờ hoạt động:</b> ${activeHours}<br>
                <b>Trạng thái:</b> ${status}
                </p>

                <a
                href="https://www.google.com/maps?q=${lat},${lng}"
                target="_blank"
                style="
                background:#2563eb;
                color:white;
                padding:10px 12px;
                border-radius:8px;
                text-decoration:none;">
                📍 Mở Google Maps
                </a>

            </div>
        `);

        marker.addTo(map);
    }

})
.catch(err=>{
    console.error(err);
    alert("Không đọc được file CSV");
});

</script>

</body>
</html>
