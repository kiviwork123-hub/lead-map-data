```html
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>HCM Lead Map</title>

<link href="https://api.mapbox.com/mapbox-gl-js/v3.5.1/mapbox-gl.css" rel="stylesheet">

<style>
body{
 margin:0;
 padding:0;
 font-family:Arial;
}

#map{
 width:100%;
 height:100vh;
}

.info{
 position:absolute;
 top:10px;
 left:10px;
 z-index:999;
 background:white;
 padding:10px;
 border-radius:10px;
 box-shadow:0 2px 10px rgba(0,0,0,.2);
}
</style>
</head>

<body>

<div class="info">
 <b>HCM Lead Map</b><br>
 <span id="count">Loading...</span>
</div>

<div id="map"></div>

<script src="https://api.mapbox.com/mapbox-gl-js/v3.5.1/mapbox-gl.js"></script>

<script>

mapboxgl.accessToken =
'pk.eyJ1IjoiamFja2RvYW4iLCJhIjoiY21xcXhteHBpMGpoaTJwb29jeW55cnNkcCJ9.3A2FH2ggqtAiQJXfYpqXiQ';

const map = new mapboxgl.Map({
 container:'map',
 style:'mapbox://styles/mapbox/light-v11',
 center:[106.7009,10.7769],
 zoom:10
});

const CSV_URL =
'https://raw.githubusercontent.com/kiviwork123-hub/lead-map-data/main/hcm-leads.csv';

fetch(CSV_URL)
.then(r=>r.text())
.then(csv=>{

 const lines = csv.trim().split('\n');

 document.getElementById('count').innerText =
 (lines.length-1).toLocaleString() + ' leads';

 const geojson = {
   type:'FeatureCollection',
   features:[]
 };

 for(let i=1;i<lines.length;i++){

   const row = lines[i].split(',');

   const lat = parseFloat(row[0]?.replace(/"/g,''));
   const lng = parseFloat(row[1]?.replace(/"/g,''));

   if(isNaN(lat)||isNaN(lng)) continue;

   geojson.features.push({
      type:'Feature',
      geometry:{
         type:'Point',
         coordinates:[lng,lat]
      },
      properties:{
         bank:row[2]?.replace(/"/g,'') || '',
         tail3:row[3]?.replace(/"/g,'') || '',
         qrType:row[4]?.replace(/"/g,'') || '',
         activeHours:row[5]?.replace(/"/g,'') || '',
         status:row[6]?.replace(/"/g,'') || '',
         district:row[8]?.replace(/"/g,'') || '',
         ward:row[9]?.replace(/"/g,'') || '',
         street:row[10]?.replace(/"/g,'') || ''
      }
   });

 }

 map.on('load',()=>{

   map.addSource('leads',{
      type:'geojson',
      data:geojson,
      cluster:true,
      clusterRadius:40,
      clusterMaxZoom:14
   });

   map.addLayer({
      id:'clusters',
      type:'circle',
      source:'leads',
      filter:['has','point_count'],
      paint:{
        'circle-color':'#2563eb',
        'circle-radius':[
          'step',
          ['get','point_count'],
          18,
          100,
          24,
          1000,
          32
        ]
      }
   });

   map.addLayer({
      id:'cluster-count',
      type:'symbol',
      source:'leads',
      filter:['has','point_count'],
      layout:{
        'text-field':['get','point_count_abbreviated'],
        'text-size':12
      }
   });

   map.addLayer({
      id:'points',
      type:'circle',
      source:'leads',
      filter:['!',['has','point_count']],
      paint:{
        'circle-color':'#ef4444',
        'circle-radius':3
      }
   });

   map.on('click','points',(e)=>{

      const p = e.features[0].properties;

      const lng = e.lngLat.lng;
      const lat = e.lngLat.lat;

      new mapboxgl.Popup()
      .setLngLat([lng,lat])
      .setHTML(`
        <div style="min-width:240px">

          <h3>${p.bank}</h3>

          <p>
          <b>Đuôi TK:</b> ${p.tail3}<br>
          <b>QR:</b> ${p.qrType}<br>
          <b>Giờ:</b> ${p.activeHours}<br>
          <b>Trạng thái:</b> ${p.status}<br>
          <b>Quận:</b> ${p.district}<br>
          <b>Phường:</b> ${p.ward}<br>
          <b>Đường:</b> ${p.street}
          </p>

          <a
          target="_blank"
          href="https://www.google.com/maps?q=${lat},${lng}">
          📍 Mở Google Maps
          </a>

        </div>
      `)
      .addTo(map);

   });

   map.on('click','clusters',(e)=>{

      const features =
      map.queryRenderedFeatures(
         e.point,
         {layers:['clusters']}
      );

      const clusterId =
      features[0].properties.cluster_id;

      map.getSource('leads')
      .getClusterExpansionZoom(
      clusterId,
      (err,zoom)=>{

        if(err) return;

        map.easeTo({
           center:
           features[0].geometry.coordinates,
           zoom
        });

      });

   });

 });

});

</script>

</body>
</html>
