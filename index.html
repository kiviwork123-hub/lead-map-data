<script src="https://api.mapbox.com/mapbox-gl-js/v3.5.1/mapbox-gl.js"></script>

<script>
mapboxgl.accessToken = 'TOKEN_CUA_CAU';

const map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/light-v11',
    center: [106.7, 10.8],
    zoom: 5
});

const CSV_URL =
'https://raw.githubusercontent.com/kiviwork123-hub/lead-map-data/main/lead-map%20(1)%20full%202.csv';

const colors = {
    ACB:'#2563eb',
    VCB:'#16a34a',
    TCB:'#f97316',
    MBB:'#7c3aed',
    BIDV:'#dc2626',
    HDB:'#ca8a04',
    MSB:'#0891b2',
    VPB:'#15803d'
};

fetch(CSV_URL)
.then(r => r.text())
.then(csv => {

    const lines = csv.trim().split('\n');

    const geojson = {
        type: 'FeatureCollection',
        features: []
    };

    for(let i=1;i<lines.length;i++){

        const row = lines[i].split(',');

        const lat = parseFloat(row[0]);
        const lng = parseFloat(row[1]);

        if(isNaN(lat) || isNaN(lng)) continue;

        geojson.features.push({
            type:'Feature',
            geometry:{
                type:'Point',
                coordinates:[lng,lat]
            },
            properties:{
                bank:row[2] || '',
                tail3:row[3] || '',
                qrType:row[4] || '',
                activeHours:row[5] || '',
                status:row[6] || ''
            }
        });
    }

    map.on('load', () => {

        map.addSource('leads', {
            type:'geojson',
            data:geojson,
            cluster:true,
            clusterMaxZoom:14,
            clusterRadius:40
        });

        map.addLayer({
            id:'clusters',
            type:'circle',
            source:'leads',
            filter:['has','point_count'],
            paint:{
                'circle-color':'#3b82f6',
                'circle-radius':[
                    'step',
                    ['get','point_count'],
                    15,
                    100,
                    20,
                    1000,
                    28
                ]
            }
        });

        map.addLayer({
            id:'cluster-count',
            type:'symbol',
            source:'leads',
            filter:['has','point_count'],
            layout:{
                'text-field':['get','point_count_abbreviated'],
                'text-size':12
            }
        });

        map.addLayer({
            id:'lead-points',
            type:'circle',
            source:'leads',
            filter:['!',['has','point_count']],
            paint:{
                'circle-radius':3,
                'circle-color':'#ef4444'
            }
        });

        map.on('click','lead-points',(e)=>{

            const p = e.features[0].properties;
            const lng = e.lngLat.lng;
            const lat = e.lngLat.lat;

            new mapboxgl.Popup()
            .setLngLat([lng,lat])
            .setHTML(`
                <div style="min-width:220px">
                    <h3>${p.bank}</h3>

                    <p>
                    <b>Đuôi TK:</b> ${p.tail3}<br>
                    <b>QR:</b> ${p.qrType}<br>
                    <b>Giờ HĐ:</b> ${p.activeHours}<br>
                    <b>Trạng thái:</b> ${p.status}
                    </p>

                    <a
                    target="_blank"
                    href="https://www.google.com/maps?q=${lat},${lng}">
                    📍 Mở Google Maps
                    </a>
                </div>
            `)
            .addTo(map);

        });

        map.on('click','clusters',(e)=>{

            const features = map.queryRenderedFeatures(
                e.point,
                { layers:['clusters'] }
            );

            const clusterId =
                features[0].properties.cluster_id;

            map.getSource('leads')
            .getClusterExpansionZoom(
                clusterId,
                (err,zoom)=>{

                    if(err) return;

                    map.easeTo({
                        center:
                        features[0].geometry.coordinates,
                        zoom
                    });

                }
            );

        });

    });

});
</script>
