function csvToGeoJSON(text){

const lines=text.trim().split("\n");

const features=[];

for(let i=1;i<lines.length;i++){

const row=lines[i].split(",");

if(row.length<11) continue;

const lat=parseFloat(row[0]);
const lng=parseFloat(row[1]);

if(isNaN(lat)||isNaN(lng)) continue;

features.push({
type:"Feature",
geometry:{
type:"Point",
coordinates:[lng,lat]
},
properties:{
bank:row[2]||"",
tail3:row[3]||"",
trans:row[4]||"",
active:row[5]||"",
note:row[6]||"",
pic:row[7]||"",
district:row[8]||"",
ward:row[9]||"",
street:row[10]||""
}
});

}

return {
type:"FeatureCollection",
features
};

}
function predictBusiness(active, trans){

trans = Number(trans || 0);

if(active.includes("5-12")){
  if(trans > 100) return "Cafe / Ăn sáng";
  if(trans > 50) return "Tạp hóa";
  return "Cửa hàng nhỏ";
}

if(active.includes("13-17")){
  return "Shop / Dịch vụ";
}

if(active.includes("18-23")){
  if(trans > 80) return "Quán ăn";
  return "Cafe tối";
}

if(active.includes("All Day")){
  if(trans > 100) return "Mini Mart";
  return "Tạp hóa";
}

return "Chưa xác định";
}

<script>

let myMarker = null;

const gpsBtn = document.createElement("button");
gpsBtn.innerHTML = "📍 Vị trí của tôi";

gpsBtn.style.position = "absolute";
gpsBtn.style.right = "15px";
gpsBtn.style.bottom = "100px";
gpsBtn.style.zIndex = "999";

document.body.appendChild(gpsBtn);

gpsBtn.onclick = () => {

navigator.geolocation.watchPosition(

(pos)=>{

const lat = pos.coords.latitude;
const lng = pos.coords.longitude;

if(!myMarker){

myMarker = new mapboxgl.Marker()
.setLngLat([lng,lat])
.addTo(map);

map.flyTo({
center:[lng,lat],
zoom:17
});

}else{

myMarker.setLngLat([lng,lat]);

}

},

(err)=>{
alert("Vui lòng bật GPS");
console.log(err);
},

{
enableHighAccuracy:true
}

);

};
</script>
