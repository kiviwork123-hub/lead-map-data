<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Lead Map HCM</title>

<link href="https://api.mapbox.com/mapbox-gl-js/v3.5.1/mapbox-gl.css" rel="stylesheet">

<style>
html,body{
margin:0;
padding:0;
height:100%;
font-family:Arial,sans-serif;
}

#map{
width:100%;
height:100%;
}

.topbar{
position:absolute;
top:10px;
left:10px;
z-index:999;
background:#fff;
padding:10px 14px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.15);
}

.count{
font-size:13px;
color:#666;
margin-top:4px;
}
</style>
</head>

<body>

<div class="topbar">
<div><b>📍 HCM Lead Map</b></div>
<div class="count" id="count">Loading...</div>
</div>

<div id="map"></div>

<script src="https://api.mapbox.com/mapbox-gl-js/v3.5.1/mapbox-gl.js"></script>

<script>

mapboxgl.accessToken =
'PASTE_MAPBOX_TOKEN_HERE';

const CSV_URL =
'https://raw.githubusercontent.com/kiviwork123-hub/lead-map-data/main/hcm-leads-full.csv';

const map = new mapboxgl.Map({
container:'map',
style:'mapbox://styles/mapbox/light-v11',
center:[106.7009,10.7769],
zoom:10
});

function parseCSV(text){

const lines=text.trim().split('\n');
const headers=lines[0].split(',');

const features=[];

for(let i=1;i<lines.length;i++){

const row=lines[i].match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);

if(!row) continue;

const lat=parseFloat(row[0]?.replaceAll('"',''));
const lng=parseFloat(row[1]?.replaceAll('"',''));

if(isNaN(lat)||isNaN(lng)) continue;

features.push({
type:'Feature',
geometry:{
type:'Point',
coordinates:[lng,lat]
},
properties:{
bank:(row[2]||'').replaceAll('"',''),
tail3:(row[3]||'').replaceAll('"',''),
qrType:(row[4]||'').replaceAll('"',''),
activeHours:(row[5]||'').replaceAll('"',''),
status:(row[6]||'').replaceAll('"',''),
trans:(row[7]||'').replaceAll('"',''),
note:(row[8]||'').replaceAll('"',''),
pic:(row[9]||'').replaceAll('"',''),
district:(row[12]||'').replaceAll('"',''),
ward:(row[13]||'').replaceAll('"',''),
street:(row[14]||'').replaceAll('"','')
}
});

}

return {
type:'FeatureCollection',
features
};

}

fetch(CSV_URL)
.then(r=>r.text())
.then(text=>{

const geojson=parseCSV(text);

document.getElementById('count').innerText =
geojson.features.length.toLocaleString() + ' leads';

map.on('load',()=>{

map.addSource('leads',{
type:'geojson',
data:geojson,
cluster:true,
clusterRadius:50,
clusterMaxZoom:14
});

map.addLayer({
id:'clusters',
type:'circle',
source:'leads',
filter:['has','point_count'],
paint:{
'circle-color':'#2563eb',
'circle-radius':[
'step',
['get','point_count'],
20,
100,
28,
1000,
36
]
}
});

map.addLayer({
id:'cluster-count',
type:'symbol',
source:'leads',
filter:['has','point_count'],
layout:{
'text-field':['get','point_count_abbreviated'],
'text-size':12
}
});

map.addLayer({
id:'points',
type:'circle',
source:'leads',
filter:['!',['has','point_count']],
paint:{
'circle-color':'#ff4d6d',
'circle-radius':5,
'circle-stroke-width':1,
'circle-stroke-color':'#fff'
}
});

map.on('click','clusters',(e)=>{

const feature=
map.queryRenderedFeatures(
e.point,
{layers:['clusters']}
)[0];

const clusterId=
feature.properties.cluster_id;

map.getSource('leads')
.getClusterExpansionZoom(
clusterId,
(err,zoom)=>{

if(err)return;

map.easeTo({
center:feature.geometry.coordinates,
zoom
});

});

});

map.on('click','points',(e)=>{

const p=e.features[0].properties;

const lng=e.lngLat.lng;
const lat=e.lngLat.lat;

new mapboxgl.Popup({
maxWidth:'380px'
})
.setLngLat([lng,lat])
.setHTML(`
<div style="font-family:Arial">

<div style="margin-bottom:8px">
<b>${p.bank}</b> • ${p.tail3}
</div>

<div style="margin-bottom:8px">
📍 ${p.street}<br>
${p.ward} ${p.district}
</div>

<div style="margin-bottom:8px">
⏰ ${p.activeHours}
</div>

<div style="margin-bottom:8px">
📈 GD: ${p.trans || '-'}
</div>

<div style="margin-bottom:8px">
👤 PIC: ${p.pic || '-'}
</div>

<div style="margin-bottom:8px">
📝 ${p.note || '-'}
</div>

<div style="margin-bottom:12px">
${p.status}
</div>

<a
target="_blank"
href="https://www.google.com/maps?q=${lat},${lng}">
📍 Google Maps
</a>

</div>
`)
.addTo(map);

});

});

});
</script>

</body>
</html>
```
